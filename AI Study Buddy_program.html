<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Study Buddy</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Segoe UI,sans-serif;
    background:#f5f7fb;
    min-height:100vh;
    padding:40px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#111827;
    font-size:42px;
}

.search-box{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:16px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#2563eb;
}

button{
    padding:16px 20px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

.actions{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.result-card{
    background:white;
    border-radius:18px;
    padding:30px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    min-height:250px;
    overflow-wrap:break-word;
}

.loading{
    display:none;
    text-align:center;
    color:#2563eb;
    font-weight:600;
    margin-bottom:15px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#6b7280;
}

.result-card h1,
.result-card h2,
.result-card h3{
    margin-top:20px;
    margin-bottom:12px;
    color:#111827;
}

.result-card p{
    margin-bottom:14px;
    line-height:1.8;
}

.result-card ul,
.result-card ol{
    margin-left:25px;
    margin-bottom:15px;
}

.result-card li{
    margin-bottom:8px;
}

.result-card strong{
    color:#111827;
}

</style>

</head>

<body>

<div class="container">

    <h1>AI Study Buddy</h1>

    <div class="search-box">

        <input
        type="text"
        id="topic"
        placeholder="Enter any topic..."
        >

        <button onclick="askAI()">
            Explain
        </button>

    </div>

    <div class="actions">

        <button onclick="copyAnswer()">
            Copy Answer
        </button>

        <button onclick="clearAnswer()">
            Clear
        </button>

    </div>

    <div class="loading" id="loading">
        Generating explanation...
    </div>

    <div class="result-card" id="result">
        <p>Enter a topic above and generate an explanation.</p>
    </div>

    <div class="footer">
        Powered by Google Gemini
    </div>

</div>

<script>

let latestAnswer="";

document.getElementById("topic")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        askAI();
    }

});

async function askAI(){

    const topic=document.getElementById("topic").value.trim();

    if(!topic){
        alert("Please enter a topic.");
        return;
    }

    document.getElementById("loading").style.display="block";

    try{

        const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=Your_API_Key",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                contents:[{
                    parts:[{
                        text:`
Explain ${topic}.

Use:
- Clear headings
- Good structure
- Examples where needed
- Professional formatting
`
                    }]
                }]

            })

        });

        const data=await response.json();

        latestAnswer =
        data.candidates[0].content.parts[0].text;

        document.getElementById("result").innerHTML =
        marked.parse(latestAnswer);

    }

    catch(error){

        document.getElementById("result").innerHTML =
        "<p>Unable to generate explanation.</p>";

        console.error(error);

    }

    document.getElementById("loading").style.display="none";

}

function copyAnswer(){

    if(!latestAnswer) return;

    navigator.clipboard.writeText(latestAnswer);

    alert("Answer copied.");

}

function clearAnswer(){

    document.getElementById("topic").value="";

    document.getElementById("result").innerHTML=
    "<p>Enter a topic above and generate an explanation.</p>";

    latestAnswer="";

}

</script>

</body>
</html>
